name: fhir-demo

services:
  postgres:
    image: postgres:16
    container_name: fhir_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fhir_demo}
      POSTGRES_USER: ${POSTGRES_USER:-fhir_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fhir_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fhir_user} -d ${POSTGRES_DB:-fhir_demo}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: fhir_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123!}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  fhir_loader:
    build:
      context: ./loader
    container_name: fhir_loader
    profiles: ["loader"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fhir_user}:${POSTGRES_PASSWORD:-fhir_password}@postgres:5432/${POSTGRES_DB:-fhir_demo}
      BUNDLE_FILE: ${BUNDLE_FILE:-/data/Abbie917_Ali918_Heathcote539_42424eb3-41c0-6ce9-bb61-8cbe23935ed4.json}
    volumes:
      - ./data:/data:ro
    entrypoint:
      [
        "sh",
        "-lc",
        "python /app/load_fhir_bundle.py \"$$DATABASE_URL\" \"$$BUNDLE_FILE\""
      ]
    restart: "no"

volumes:
  postgres_data:
  pgadmin_data:
